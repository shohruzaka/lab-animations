<!-- compiler_demo.html -->
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiler va Interpreter Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="stylesheet" href="assets/compiler_demo.css">
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><i class="bi bi-shield-lock"></i> CryptoLab</a>
        <a href="index.html">Asosiy</a>
        <a href="topics.html">Mavzular</a>
        <a href="tarmoq.html">Tarmoq</a>
    </nav>

    <header>
        <h1>Tarjimon (Compiler/Interpreter) qanday ishlaydi?</h1>
        <div class="controls">
            <select id="templateSelect">
                <option value="arithmetic">Arifmetik: x = 5 + 3;</option>
            </select>
            <select id="targetSelect">
                <option value="compiler">Kompilyator (Compiler)</option>
                <option value="interpreter">Interpretator (Interpreter)</option>
            </select>
            <button id="startBtn">Boshlash</button>
        </div>
    </header>

    <main class="pipeline-v2" id="pipelineArea">
        <div class="stage-container">
            <div class="stage-box" id="stage-source">Source Code</div>
            <div class="stage-box" id="stage-lexer">Lexical Analyzer</div>
            <div class="stage-box" id="stage-parser">Syntax Analyzer</div>
            <div class="stage-box" id="stage-target">Target (Compiler/Interpreter)</div>
            <div class="stage-box" id="stage-output">Output / Result</div>
        </div>
        <!-- Animatsiya qilinadigan elementlar shu yerga tushadi -->
        <div id="animationLayer"></div>
    </main>

    <div id="detailsModal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">Detallar</h2>
            <pre id="modalBody"></pre>
            <button onclick="document.getElementById('detailsModal').classList.add('hidden')">Yopish</button>
        </div>
    </div>

    <script src="assets/compiler_demo.js"></script>
    <script>
        document.getElementById('startBtn').addEventListener('click', () => {
            const tplName = document.getElementById('templateSelect').value;
            window.startPipeline(tplName);
        });
    </script>
</body>
</html>
